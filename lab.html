<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مصاريف المخبر - متقدم</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: #f4f6f9;
}

h2 { color: #2c3e50; }

.box {
    background: white;
    padding: 15px;
    margin: 10px auto;
    width: 90%;
    max-width: 500px;
    border-radius: 10px;
}

input, select, textarea, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
}

textarea { height: 60px; }

button {
    background: #27ae60;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover { background: #2ecc71; }

table {
    width: 95%;
    margin: auto;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #2c3e50;
    color: white;
}

.total { font-size: 20px; margin: 15px; color: #e74c3c; }

.pagination {
    margin: 10px;
}
.pagination button {
    margin: 2px;
    padding: 5px 10px;
}
</style>
</head>

<body>

<h2>📊 إدارة مصاريف المخبر</h2>

<div class="box">
    <input type="number" id="amount" placeholder="المبلغ">
    
    <select id="type">
        <option>كواشف</option>
        <option>عمال</option>
        <option>كهرباء</option>
        <option>ماء</option>
        <option>صيانة</option>
        <option>أخرى</option>
    </select>

    <input type="date" id="date">

    <textarea id="note" placeholder="ملاحظة"></textarea>

    <button onclick="saveExpense()">حفظ</button>
    <input type="hidden" id="editId">
</div>

<div class="total">
    المجموع: <span id="total">0</span> دج
</div>

<div class="box">
    <label>فلتر حسب النوع:</label>
    <select id="filterType" onchange="loadData()">
        <option value="">الكل</option>
        <option>كواشف</option>
        <option>عمال</option>
        <option>كهرباء</option>
        <option>ماء</option>
        <option>صيانة</option>
        <option>أخرى</option>
    </select>
</div>

<table>
<thead>
<tr>
    <th>المبلغ</th>
    <th>النوع</th>
    <th>التاريخ</th>
    <th>ملاحظة</th>
    <th>تعديل</th>
    <th>حذف</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<div class="pagination" id="pagination"></div>

<script>
let currentPage = 1;
const itemsPerPage = 10;

// إضافة أو تعديل
function saveExpense() {
    let amount = document.getElementById("amount").value;
    let type = document.getElementById("type").value;
    let date = document.getElementById("date").value;
    let note = document.getElementById("note").value;
    let editId = document.getElementById("editId").value;

    if (!amount || !date) {
        alert("أدخل البيانات كاملة");
        return;
    }

    let url = editId ? `http://localhost:3000/edit/${editId}` : "http://localhost:3000/add";
    let method = editId ? "PUT" : "POST";

    fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, type, date, note })
    })
    .then(() => {
        loadData();
        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
        document.getElementById("editId").value = "";
    });
}

// تحميل البيانات مع فلترة وتجزئة
function loadData(page = 1) {
    let filterType = document.getElementById("filterType").value;

    fetch("http://localhost:3000/all")
    .then(res => res.json())
    .then(data => {
        if (filterType) data = data.filter(e => e.type === filterType);

        let total = data.reduce((sum, e) => sum + Number(e.amount), 0);
        document.getElementById("total").innerText = total;

        const start = (page - 1) * itemsPerPage;
        const paginatedData = data.slice(start, start + itemsPerPage);

        let list = document.getElementById("list");
        list.innerHTML = "";
        paginatedData.forEach(e => {
            list.innerHTML += `
            <tr>
                <td>${e.amount}</td>
                <td>${e.type}</td>
                <td>${e.date}</td>
                <td>${e.note || ""}</td>
                <td><button onclick="editExpense(${e.id})">✏️</button></td>
                <td><button onclick="deleteExpense(${e.id})">❌</button></td>
            </tr>`;
        });

        // Pagination
        const totalPages = Math.ceil(data.length / itemsPerPage);
        let paginationDiv = document.getElementById("pagination");
        paginationDiv.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
            paginationDiv.innerHTML += `<button onclick="loadData(${i})">${i}</button>`;
        }
        currentPage = page;
    });
}

// تعديل
function editExpense(id) {
    fetch(`http://localhost:3000/all`)
    .then(res => res.json())
    .then(data => {
        const e = data.find(x => x.id === id);
        document.getElementById("amount").value = e.amount;
        document.getElementById("type").value = e.type;
        document.getElementById("date").value = e.date;
        document.getElementById("note").value = e.note;
        document.getElementById("editId").value = e.id;
    });
}

// حذف
function deleteExpense(id) {
    fetch(`http://localhost:3000/delete/${id}`, { method: "DELETE" })
    .then(() => loadData(currentPage));
}

// تحميل عند فتح الصفحة
loadData();
</script>

</body>
</html>
